name: Sati
options:
  bundleIdPrefix: com.sati
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
targets:
  Sati:
    type: application
    platform: macOS
    sources: [Sati]
    settings:
      base:
        INFOPLIST_FILE: Sati/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.sati.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
    resources:
      - path: Sati/Sounds
        buildPhase: resources
